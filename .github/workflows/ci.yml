name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.platform }}
        run: >
          xcodebuild build
          -scheme Siren
          -destination 'generic/platform=${{ matrix.platform }}'
          CODE_SIGNING_ALLOWED=NO
        env:
          NSUnbufferedIO: YES
